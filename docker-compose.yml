services:
  db:
    image: postgres:15-alpine
    container_name: bayzdelivery_db
    environment:
      POSTGRES_DB: bayzdelivery
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: 123qwe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bayzdelivery_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d bayzdelivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bayzdelivery_app
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://db:5432/bayzdelivery
      DB_USERNAME: db_user
      DB_PASSWORD: 123qwe
      LOG_PATH: /app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bayzdelivery_network

volumes:
  postgres_data:

networks:
  bayzdelivery_network:
    driver: bridge
